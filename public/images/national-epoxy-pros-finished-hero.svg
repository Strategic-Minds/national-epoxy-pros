<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1040" role="img" aria-labelledby="title desc">
  <title id="title">National Epoxy Pros luxury garage hero</title>
  <desc id="desc">Premium black white and yellow garage epoxy floor with a sports car, glossy reflections, cabinets, and showroom lighting.</desc>
  <defs>
